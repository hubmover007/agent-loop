# LLM Pool Configuration
# ⚠️  此文件不存储任何密钥，只存储配置元数据
# 密钥加载优先级：
#   1. 环境变量（$key_env）
#   2. ~/.openclaw/.env 文件
#   3. 系统 keychain（未来支持）
#
# 参考设计：OpenClaw provider registry + Claude Code resolvedModel 模式

version: "1.0"

providers:
  - id: deepseek-chat
    type: openai_compatible
    protocol: openai-completions
    auth:
      method: env_var                 # env_var | aws_sdk | gcp_adc | none
      key_env: DEEPSEEK_API_KEY
    endpoint:
      base_url: https://api.deepseek.com/v1
      model: deepseek-chat
      timeout_s: 60
      max_retries: 3
    capabilities: [general, coding, reasoning]
    context_window: 64000
    max_output_tokens: 8192
    cost:                             # $/1M tokens（对齐 OpenClaw cost 格式）
      input: 0.14
      output: 0.28
      cache_read: 0.014
      cache_write: 0.14
    limits:
      max_concurrent: 10
      requests_per_minute: 60
      tokens_per_minute: 500000
    circuit_breaker:
      failure_threshold: 5
      recovery_timeout_s: 60
    enabled: true
    tags: [production, cheap]

  - id: deepseek-reasoner
    type: openai_compatible
    protocol: openai-completions
    auth:
      method: env_var
      key_env: DEEPSEEK_API_KEY
    endpoint:
      base_url: https://api.deepseek.com/v1
      model: deepseek-reasoner
      timeout_s: 120
      max_retries: 2
    capabilities: [reasoning, math, analysis, coding]
    context_window: 64000
    max_output_tokens: 8192
    cost:
      input: 0.55
      output: 2.19
      cache_read: 0.055
      cache_write: 0.55
    limits:
      max_concurrent: 5
      requests_per_minute: 30
    circuit_breaker:
      failure_threshold: 5
      recovery_timeout_s: 60
    enabled: true
    tags: [production, reasoning]

  - id: claude-sonnet
    type: anthropic_bedrock
    protocol: bedrock-converse-stream
    auth:
      method: aws_sdk                 # 走 boto3，不需要 key_env
      profile: serverless-openclaw   # AWS CLI profile
      region: us-east-1
    endpoint:
      model: us.anthropic.claude-sonnet-4-6-v1
      timeout_s: 120
      max_retries: 2
    capabilities: [general, coding, reasoning, long_context, vision]
    context_window: 200000
    max_output_tokens: 8192
    cost:
      input: 3.0
      output: 15.0
      cache_read: 0.30
      cache_write: 3.75
    limits:
      max_concurrent: 5
      requests_per_minute: 20
    circuit_breaker:
      failure_threshold: 3
      recovery_timeout_s: 120
    enabled: false                    # 需要 AWS 凭证
    tags: [production, powerful, vision]

  - id: gemini-flash
    type: google_gemini
    protocol: google-gemini
    auth:
      method: env_var
      key_env: GOOGLE_API_KEY
    endpoint:
      base_url: https://generativelanguage.googleapis.com/v1beta
      model: gemini-2.5-flash
      timeout_s: 60
      max_retries: 3
    capabilities: [general, coding, vision, long_context]
    context_window: 1000000
    max_output_tokens: 8192
    cost:
      input: 0.075
      output: 0.30
    limits:
      max_concurrent: 20
      requests_per_minute: 1000
    circuit_breaker:
      failure_threshold: 5
      recovery_timeout_s: 30
    enabled: false
    tags: [fast, cheap, vision, long_context]

  - id: easyrouter-deepseek
    type: openai_compatible
    protocol: openai-completions
    auth:
      method: env_var
      key_env: EASYROUTER_API_KEY
    endpoint:
      base_url: https://easyrouter.io/v1
      model: deepseek-v4-pro
      timeout_s: 60
      max_retries: 3
    capabilities: [general, coding, reasoning]
    context_window: 64000
    max_output_tokens: 8192
    cost:
      input: 0.20
      output: 0.60
    limits:
      max_concurrent: 10
      requests_per_minute: 100
    circuit_breaker:
      failure_threshold: 5
      recovery_timeout_s: 60
    enabled: true
    tags: [production, routing]

  - id: glm-local
    type: openai_compatible
    protocol: openai-completions
    auth:
      method: none                    # 本地无需认证
    endpoint:
      base_url: http://localhost:8000/v1
      model: GLM-5.2
      timeout_s: 300
      max_retries: 1
    capabilities: [general, coding]
    context_window: 32000
    max_output_tokens: 4096
    cost:
      input: 0.0
      output: 0.0
    limits:
      max_concurrent: 2
      requests_per_minute: 20
    circuit_breaker:
      failure_threshold: 3
      recovery_timeout_s: 30
    enabled: false
    tags: [local, free, offline]

# ============================================================
# 选择策略
# ============================================================
selection_strategies:
  cheapest:
    description: 成本最低的可用 provider
    sort_by: cost.input
    ascending: true

  fastest:
    description: 并发量最大（延迟最低）的 provider
    sort_by: limits.requests_per_minute
    ascending: false

  most_capable:
    description: 能力最强的 provider（成本高 = 能力强）
    prefer_tags: [powerful]
    sort_by: cost.input
    ascending: false

  balanced:
    description: 综合成本/速度/能力的平衡选择
    weights:
      cost: 0.35          # 越便宜分越高
      speed: 0.30         # RPM 越高分越高
      capability: 0.35    # 能力匹配度

  local_first:
    description: 优先使用本地模型，不可用则 fallback cheapest
    prefer_tags: [local, free]
    fallback: cheapest

  cheapest_capable:
    description: 满足能力要求的最便宜选项
    sort_by: cost.input
    ascending: true

# ============================================================
# 任务类型 → 默认策略映射
# ============================================================
task_strategies:
  default: balanced
  coding: cheapest_capable
  reasoning: most_capable
  quick: fastest
  vision: balanced            # 自动过滤有 vision 能力的
  long_context: balanced      # 自动过滤有 long_context 能力的
  budget: cheapest
  local: local_first
