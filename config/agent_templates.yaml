templates:
  default_worker:
    llm_strategy: balanced
    llm_capabilities_required: [general]
    max_steps: 10
    ttl: 300
    tools_allowed: []  # empty = all tools

  coding_expert:
    llm_strategy: cheapest_capable
    llm_capabilities_required: [coding]
    max_steps: 20
    ttl: 600
    tools_allowed: [ssh, web, file]

  reasoning_expert:
    llm_strategy: most_capable
    llm_capabilities_required: [reasoning]
    max_steps: 15
    ttl: 600
    tools_allowed: []

  fast_responder:
    llm_strategy: fastest
    llm_capabilities_required: [general]
    max_steps: 5
    ttl: 120
    tools_allowed: []
