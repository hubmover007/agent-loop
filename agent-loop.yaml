# Agent-Loop Configuration
memory:
  url: "surrealdb://localhost:8001"
  namespace: "agent_loop"
  database: "main"
  embedding:
    provider: "mock"  # mock | openai | local
    model: "text-embedding-004"
    api_key: "${EASYROUTER_API_KEY}"
    base_url: "https://easyrouter.io/v1"
    dimensions: 768
    batch_size: 100
    cache_enabled: true

llm:
  provider: "deepseek"
  api_key: "${DEEPSEEK_API_KEY}"
  model: "deepseek-chat"

loop:
  max_reason_loops: 3
  reason_confidence_threshold: 0.85
  max_agent_concurrent: 10
  accept_threshold: 0.7

tools:
  brave_api_key: "${BRAVE_API_KEY}"
  code_workspace: "/tmp/agent_loop/workspace"

server:
  host: "0.0.0.0"
  port: 8000
