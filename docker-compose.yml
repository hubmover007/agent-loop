version: "3.8"

services:
  agent-loop:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config
      - ./state:/app/state
      - ./logs:/app/logs
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
